      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.font = `${size}px "Yu Mincho","Hiragino Mincho ProN","MS Mincho",serif`;

      ctx.fillStyle = withAlpha(s.color, localOpacity * (0.10 + revealGlow));
      ctx.fillText(p.ch, 2.0, 2.6);

      if(revealGlow > 0.08){
        ctx.fillStyle = withAlpha("#ffffff", localOpacity * revealGlow * 0.22);
        ctx.fillText(p.ch, 0, 0);
      }

      ctx.fillStyle = withAlpha(s.color, localOpacity);
      ctx.fillText(p.ch, 0, 0);
      ctx.restore();
    }
  }

  function update(now){
    const dt = clamp((now - state.lastTime) / 1000, 0.001, 0.033);
    state.lastTime = now;

    if(state.phase === "playing"){
      chooseScene(now);

      maybeStartQuietAndHero(now);
      updateBackdropActors(dt, now);
      updateBackdropParticles(dt);

      if(now >= state.quietUntil && state.active.length < state.targetConcurrent && now >= state.nextSpawnAt){
        spawnOne(now);
      }

      const survivors = [];
      for(const s of state.active){
        updateSpeech(s, dt, now);

        const expired = s.age >= s.life;

        if(!expired){
          survivors.push(s);
        } else {
          state.echoes.push({
            x: s.centerX,
            y: Math.min(s.centerY, H - 10),
            strength: 1,
            bornAt: now
          });
          state.recentVoices.push({
            x: s.centerX,
            y: s.centerY,
            bornAt: now,
            mood: s.semanticWeight,
            text: s.text,
            strength: 1
          });
          if(state.recentVoices.length > 12) state.recentVoices.shift();
          if(s.id === state.heroSpeechId){
            state.heroSpeechId = null;
          }
        }
      }
      state.active = survivors;

      state.echoes = state.echoes.filter(e => now - e.bornAt < 8000);
      for(const e of state.echoes){
        e.strength *= 0.992;
      }

      state.recentVoices = state.recentVoices.filter(v => now - v.bornAt < 9000);
      for(const v of state.recentVoices){
        v.strength *= 0.992;
      }

      let tension = 0;
      let softness = 0;
      let question = 0;
      let resonance = 0;
      let drift = 0;

      for(const s of state.active){
        tension += (s.semanticWeight.exclaim ? 1 : 0) + (s.semanticWeight.hardness || 0) * 0.7;
        softness += (s.semanticWeight.softness || 0) + (s.semanticWeight.pause ? 0.4 : 0);
        question += s.semanticWeight.question ? 1 : 0;
        resonance += (s.isHero ? 0.9 : 0.36) + getReformMix(s.schedule, s.age) * 0.42;
        drift += (s.preMode === "orbit" || s.preMode === "breath" || s.preMode === "float" || s.preMode === "halo" ? 0.38 : 0.18) + (s.semanticWeight.pause ? 0.14 : 0);
      }

      for(const v of state.recentVoices){
        const age = 1 - Math.min(1, (now - v.bornAt) / 9000);
        tension += ((v.mood.exclaim ? 1 : 0) + (v.mood.hardness || 0) * 0.5) * age * 0.45;
        softness += ((v.mood.softness || 0) + (v.mood.pause ? 0.3 : 0)) * age * 0.45;
        question += (v.mood.question ? 1 : 0) * age * 0.45;
        resonance += age * (v.mood.question ? 0.18 : 0.10);
        drift += age * (v.mood.pause ? 0.12 : 0.06);
      }

      const segment = state.rhythmSegment || { backdropDrift:0.22, backdropGlow:0.10, backdropResonance:0.14 };
      state.backdropMemory.tension += (tension - state.backdropMemory.tension) * 0.03;
      state.backdropMemory.softness += (softness - state.backdropMemory.softness) * 0.03;
      state.backdropMemory.question += (question - state.backdropMemory.question) * 0.03;
      state.backdropMemory.resonance += ((resonance + segment.backdropResonance * 3.6) - state.backdropMemory.resonance) * 0.025;
      state.backdropMemory.glow += ((segment.backdropGlow + state.backdropMemory.question * 0.05 + Math.min(1.1, resonance * 0.06)) - state.backdropMemory.glow) * 0.028;
      state.backdropMemory.drift += ((drift + segment.backdropDrift * 2.8 + state.backdropMemory.softness * 0.04) - state.backdropMemory.drift) * 0.026;
      state.backdropMemory.pulse = Math.sin(now * 0.0012 + state.rhythmProgress * Math.PI * 2) * 0.5 + 0.5;
    }
  }

  function render(now){
    if(playScreen.style.display === "none") return;

    drawBackground(now);

    if(state.phase === "ready"){
      drawReadyBackdrop(now);
      drawReady(now);
      return;
    }

    drawBackdropActors(now);
    drawBackdropParticles(now);

    for(const s of state.active) drawSpeech(s);
  }

  function loop(now){
    update(now);
    render(now);
    requestAnimationFrame(loop);
  }

  const PRESET_TEXT = '生きるべきか、死ぬべきか、それが問題だ\n友よ、ローマ市民よ、同胞よ、どうか耳を貸してくれ\nこの世はすべて舞台、人はみな役者にすぎない\n地獄とは他人のことだ\nきちんと向き合わねばならない\n知らざあ言って聞かせやしょう\n問われて名乗るもおこがましいが\nこいつぁ春から縁起がええわぇ\n鍵は閉めなくていい、どうせ出ていくのは私だから\n拍手って、赦しの代わりにはならないんだよ\nそういうところだけ、昔のままだね\n終電はもうない\n世界を変える話じゃないよ\n好きだった、たぶん今も\n私たち、不幸になるために会ったわけじゃない\n待って\n昔の話していい？\n今日の私は強いよ\n別れ話って、もっと派手だと思ってた\n夢を諦めたんじゃない、順番を、譲っただけ\nあなたの「いつか」って、だいたい私がいない日だね\nごめん\n欲しかったの\n他人みたいに優しくしないで\n私はちゃんと見てたよ\n弱くてもいいじゃない\n先に食べてていいよ\n今日のコーヒー、なんか妙に当たりじゃない？\nその服いいね\nそれ私も気になってた\nまあそういう日もあるか\n返事ないけどたぶん起きてるよね\n笑うほどじゃないけどちょっと好きだな\n今日の夕飯どうする？\n目覚ましって裏切るよね\n部活ある日は、帰り道までちょっと青春っぽい\nじゃあまた明日、って言えるのけっこう好き\nこういう日も嫌いじゃないけど\n無理に元気なふりしなくていい年齢でしょう、もう\nお疲れ様ー！\n弁当、また唐揚げ？\n駅まで送るよ\nずっと既読だけついてるの何\nしょまごって…何？\n体育のあとに６限って無理じゃない？\nいや、今ちょっと迷ったでしょ\nすべての幸福な家庭は似ている\n大きいものと小さいものがある\nぼくは透明人間だ\n恥の多い生涯を送って来ました\nメロスは激怒した\n智に働けば角が立つ\nそれは最高の時代であり、最悪の時代でもあった';

  function startPreset(){
    textInput.value = PRESET_TEXT;
    const checked = validateInput(PRESET_TEXT);
    if(!checked.ok){
      message.textContent = checked.message;
      return;
    }
    state.lines = checked.lines;
    state.backdropText = backdropInput.value.trim();
    state.backdropActors = createBackdropActors(state.backdropText);
    refillBag();
    state.active = [];
    state.phase = "ready";
    message.textContent = "";
    inputScreen.style.display = "none";
    playScreen.style.display = "block";
  }

  storeButton.addEventListener("click", storeLines);
  presetButton.addEventListener("click", startPreset);
  textInput.addEventListener("keydown", (e) => {
    if((e.ctrlKey || e.metaKey) && e.key === "Enter"){
      e.preventDefault();
      storeLines();
    }
  });

  canvas.addEventListener("mousedown", (e) => {
    if(state.phase !== "ready") return;
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    const r = state.showRect;
    if(!r || (mx >= r.x && mx <= r.x + r.w && my >= r.y && my <= r.y + r.h)){
      beginPlay(performance.now());
    }
  });

  canvas.addEventListener("touchstart", (e) => {
    if(state.phase !== "ready") return;
    const rect = canvas.getBoundingClientRect();
    const touch = e.touches[0];
    const mx = touch.clientX - rect.left;
    const my = touch.clientY - rect.top;
    const r = state.showRect;
    if(!r || (mx >= r.x && mx <= r.x + r.w && my >= r.y && my <= r.y + r.h)){
      beginPlay(performance.now());
    }
  }, { passive:true });

  requestAnimationFrame(loop);
})();
</script>
